name: check

on:
  push:
    branches-ignore:
      - 'master'
  pull_request:
    branches:
      - 'master'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Check
        run: |
          npm ci
          npm run lint
          npm run build
          npm run test
