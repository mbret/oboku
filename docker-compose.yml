services:
  couchdb:
    image: mbret/oboku-couchdb
    restart: always
    # No host ports: CouchDB is reachable only on the internal Docker network as
    # `couchdb:5984`. The couchdb-proxy service below is what gets published.
    env_file:
      - .env
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      JWT_PRIVATE_KEY_FILE: ${JWT_PRIVATE_KEY_FILE:-/secrets/jwt_private_key.pem}
      JWT_PUBLIC_KEY_FILE: ${JWT_PUBLIC_KEY_FILE:-/secrets/jwt_public_key.pem}
    volumes:
      - ./secrets:/secrets:ro
      - oboku-couchdb-data:/opt/couchdb/data
      - oboku-couchdb-config:/opt/couchdb/etc/local.d

  couchdb-proxy:
    image: mbret/oboku-couchdb-proxy
    restart: always
    depends_on:
      - couchdb
    environment:
      COUCHDB_UPSTREAM: ${COUCHDB_UPSTREAM:-http://couchdb:5984}
    ports:
      - "5984:80"
      # extra binds used for http/1 load balancing
      - "5985:80"
      - "5986:80"
      - "5987:80"

  postgres:
    image: postgres:17
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oboku}
    volumes:
      - oboku-postgres:/var/lib/postgresql/data

  web:
    image: mbret/oboku-web
    restart: always
    env_file:
      - .env
    ports:
      - "80:80"

  admin:
    image: mbret/oboku-admin
    restart: always
    ports:
      - "3003:80"
    environment:
      ASSET_DIR: ${ASSET_DIR:-/usr/share/nginx/html}
      APP_PREFIX: ${APP_PREFIX:-VITE_}
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}

  api:
    image: mbret/oboku-api
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost}
      JWT_PRIVATE_KEY_FILE: ${JWT_PRIVATE_KEY_FILE:-/secrets/jwt_private_key.pem}
      JWT_PUBLIC_KEY_FILE: ${JWT_PUBLIC_KEY_FILE:-/secrets/jwt_public_key.pem}
      API_DATA_DIR: ${API_DATA_DIR:-/var/lib/oboku/data}
      API_CONFIG_DIR: ${API_CONFIG_DIR:-/var/lib/oboku/config}
    volumes:
      - ./secrets:/secrets:ro
      - ./config:${API_CONFIG_DIR:-/var/lib/oboku/config}
      - oboku-api-data:${API_DATA_DIR:-/var/lib/oboku/data}

volumes:
  oboku-postgres:
  oboku-couchdb-data:
  oboku-couchdb-config:
  oboku-api-data:
