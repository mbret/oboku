server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Requests that already look like concrete files should never fall back to the SPA shell.
  #
  # Examples:
  # - "/assets/main.js"
  # - "/cover.png"
  # - "/auth-callback-dropbox.html"
  #
  # If one of those files is missing, returning index.html would turn a real missing
  # asset into a confusing HTML response with status 200, so we keep the nginx 404.
  location ~ \.[^/]+$ {
    try_files $uri =404;
  }

  # Everything else is treated as a document-style navigation.
  #
  # Resolution order:
  # 1. Serve an exact file if it exists.
  #    Example: "/manifest.webmanifest"
  # 2. Try the matching standalone HTML entrypoint.
  #    Example: "/auth-callback-dropbox" -> "/auth-callback-dropbox.html"
  # 3. Fall back to the SPA shell for React Router routes.
  #    Examples: "/library", "/profile/settings"
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }
}
