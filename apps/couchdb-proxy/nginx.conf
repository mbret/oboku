# Reverse proxy that sits in front of CouchDB.
#
# CouchDB itself is no longer published to the host (see docker-compose.yml);
# it is only reachable on the internal Docker network as `couchdb:5984`.
# This proxy owns the public CouchDB port(s) and forwards everything through
# transparently. Bearer JWTs sent by clients are passed to CouchDB untouched,
# so authentication behaves exactly as it did when clients hit CouchDB directly.
#
# This is also the layer where cookie -> Authorization header translation will
# later live, so that the access token can move into an httpOnly cookie.

server {
  listen 5984;
  server_name _;

  # CouchDB accepts large _bulk_docs payloads and binary attachments; never cap
  # the body size at the proxy or large syncs would break.
  client_max_body_size 0;

  # Use Docker's embedded DNS resolver so that if the couchdb container restarts
  # with a new IP it is picked up, instead of being resolved once at startup and
  # cached for the life of the proxy.
  resolver 127.0.0.11 valid=30s ipv6=off;

  location / {
    # The variable forces nginx to resolve the upstream at request time (see the
    # resolver directive above). The request URI is appended automatically.
    set $upstream http://couchdb:5984;
    proxy_pass $upstream;
    # Don't let nginx rewrite Location/Refresh headers CouchDB emits (e.g. on
    # doc-creation 201s). Recommended by the official CouchDB nginx guide.
    proxy_redirect off;

    proxy_http_version 1.1;
    # Use the verbatim client Host header (authority *with* port), not $host
    # which strips the port.
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Drop the client's Connection header so keepalive to the upstream works.
    proxy_set_header Connection "";

    # Stream CouchDB's _changes longpoll/continuous feeds rather than buffering
    # them, and allow long-lived feeds to stay open.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
  }
}
